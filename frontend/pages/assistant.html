<!doctype html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Market Sense - RAG Assistant</title>
    <meta name="description" content="Trợ lý ảo AI phân tích thị trường dựa trên RAG." />
    <link rel="stylesheet" href="../assets/css/base.css" />
    <link rel="stylesheet" href="../assets/css/layout.css" />
    <link rel="stylesheet" href="../assets/css/components.css" />
</head>
<body class="minimal-theme">
    <div class="dashboard-wrapper">
        
        <header class="top-navbar">
            <div class="brand">
                <button id="toggle-sidebar-btn" class="btn-icon" aria-label="Đóng/mở menu" style="margin-right: 12px; cursor: pointer;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="12" x2="21" y2="12"></line>
                        <line x1="3" y1="6" x2="21" y2="6"></line>
                        <line x1="3" y1="18" x2="21" y2="18"></line>
                    </svg>
                </button>
                <h1>Market Sense</h1>
                <nav class="nav-links" aria-label="Điều hướng chính">
                    <a href="../index.html">Home</a>
                    <a href="./dashboard.html">Dashboard</a>
                    <a href="./assistant.html" class="active" aria-current="page">Assistant</a>
                </nav>
            </div>
        </header>

        <main class="main-content">
            <div class="chat-layout">
                
                <aside class="chat-sidebar">
                    <button class="btn-new-chat" onclick="window.location.reload();">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                        Đoạn chat mới
                    </button>

                    <div class="history-scroll-area">
                        <div class="history-group">
                            <h4 class="history-label">Phiên hiện tại</h4>
                            <ul class="history-list" id="current-session-history">
                                </ul>
                        </div>
                    </div>
                </aside>

                <div class="card chat-window">
                    
                    <div class="chat-header">
                        <h2>Market Assistant</h2>
                        <p class="card-subtitle">Hỏi đáp dữ liệu thị trường và truy xuất tin tức</p>
                    </div>

                    <div class="chat-history" id="chat-container">
                        
                        <div class="chat-message ai-message" id="welcome-message">
                            <div class="message-avatar">AI</div>
                            <div class="message-bubble">
                                <p style="margin: 0;">Xin chào! Tôi là trợ lý AI của Market Sense. Hệ thống đã sẵn sàng. Bạn có câu hỏi nào về xu hướng thị trường, tổng hợp tin tức hay mã cổ phiếu cụ thể không?</p>
                            </div>
                        </div>

                        </div>

                        <div class="chat-input-area">
                            <div class="chat-input-container">
                                <form id="rag-query-form" class="chat-form">
                                    
                                    <div class="chat-settings">
                                        <label for="top-k">Top K:</label>
                                        <input type="number" id="top-k" name="top-k" value="3" min="1" max="100" />
                                    </div>
                        
                                    <div class="input-wrapper">
                                        <input type="text" id="user-query" name="user-query" placeholder="Hỏi trợ lý về xu hướng, cổ phiếu, tin tức..." required autocomplete="off" />
                                        
                                        <button type="submit" class="btn-send" id="send-btn" aria-label="Gửi câu hỏi">
                                            <svg id="icon-send" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                                <line x1="22" y1="2" x2="11" y2="13"></line>
                                                <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                                            </svg>
                                            <svg id="icon-stop" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display: none;">
                                                <rect x="6" y="6" width="12" height="12" rx="2"></rect>
                                            </svg>
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>

                </div>
            </div>
        </main>
    </div>

    <script type="module" src="../assets/js/pages/assistant.js"></script>
</body>
</html>
